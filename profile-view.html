<!DOCTYPE html>
<html>
<head>
  <title>Shared Profile</title>
  <style>
    /* ============================
       Shared Profile Card CSS
    ============================ */

    body {
      margin: 0;
      padding: 0;
      font-family: 'Orbitron', sans-serif;
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
    }

    .shared-profile-card {
      width: 360px;
      background-color: #111;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Banner */
    .shared-profile-card .banner {
      width: 100%;
      height: 120px;
      background-color: #222;
      background-size: cover;
      background-position: center;
    }

    /* PFP */
    .shared-profile-card .pfp {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin-top: -50px;
      border: 4px solid #00e5ff;
      background-color: #333;
      background-size: cover;
      background-position: center;
    }

    /* Username */
    .shared-profile-card .username {
      font-size: 1.6rem;
      font-weight: bold;
      margin-top: 10px;
      text-align: center;
    }

    /* Level & Rank */
    .shared-profile-card .level-rank {
      display: flex;
      justify-content: space-around;
      width: 80%;
      margin-top: 10px;
    }

    .shared-profile-card .level-rank .level,
    .shared-profile-card .level-rank .rank {
      text-align: center;
      font-size: 0.9rem;
      padding: 5px 10px;
      border-radius: 10px;
      background: linear-gradient(135deg, #00e5ff, #0066ff);
      color: #000;
      font-weight: bold;
    }

    /* XP Bar */
    .shared-profile-card .xp-bar-container {
      width: 80%;
      height: 12px;
      background: #222;
      border-radius: 10px;
      margin: 15px 0;
      overflow: hidden;
    }

    .shared-profile-card .xp-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(135deg, #00e5ff, #0066ff);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    /* N-Coins */
    .shared-profile-card .ncoins {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* Achievements Grid */
    .shared-profile-card .achievements {
      width: 90%;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding-bottom: 15px;
    }

    .shared-profile-card .achievements .ach {
      flex: 0 0 40%;
      padding: 8px 5px;
      text-align: center;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .shared-profile-card .achievements .unlocked {
      background: linear-gradient(135deg, #00e5ff, #0066ff);
      color: #000;
    }

    .shared-profile-card .achievements .locked {
      background: #333;
      color: #888;
    }

  </style>
</head>
<body>

<div class="shared-profile-card" id="profile-card">
  <div class="banner" id="banner"></div>
  <div class="pfp" id="pfp"></div>
  <div class="username" id="username">Username</div>

  <div class="level-rank">
    <div class="level" id="level">Level 1</div>
    <div class="rank" id="rank">Rookie</div>
  </div>

  <div class="xp-bar-container">
    <div class="xp-bar" id="xp-bar"></div>
  </div>

  <div class="ncoins">💰 <span id="ncoins">0</span> N-Coins</div>

  <div class="achievements" id="achievements-grid"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const data = params.get("profile");

if (data) {
  const profile = JSON.parse(atob(data));

  // Set banner and PFP
  if(profile.banner) document.getElementById("banner").style.backgroundImage = `url(${profile.banner})`;
  if(profile.pfp) document.getElementById("pfp").style.backgroundImage = `url(${profile.pfp})`;

  // Username
  document.getElementById("username").innerText = profile.username || "Guest";

  // Level & Rank
  document.getElementById("level").innerText = profile.level || 1;
  document.getElementById("rank").innerText = profile.rank || "Rookie";

  // XP Bar
  const xpPercent = Math.min((profile.xp % 100), 100);
  document.getElementById("xp-bar").style.width = xpPercent + "%";

  // N-Coins
  document.getElementById("ncoins").innerText = profile.coins || 0;

  // Achievements
  const achievementList = profile.achievements || [];
  const grid = document.getElementById("achievements-grid");
  achievementList.forEach(a => {
    const div = document.createElement("div");
    div.className = "ach unlocked";
    div.innerText = a;
    grid.appendChild(div);
  });
}
</script>

</body>
</html>
