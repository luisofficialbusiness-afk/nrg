<!DOCTYPE html>
<html>
<head>
  <title>Shared Profile</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Orbitron', sans-serif;
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
    }

    .shared-profile-card {
      width: 360px;
      background-color: #111;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .banner {
      width: 100%;
      height: 120px;
      background-color: #222;
      background-size: cover;
      background-position: center;
    }

    .pfp {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin-top: -50px;
      border: 4px solid #00e5ff;
      background-color: #333;
      background-size: cover;
      background-position: center;
    }

    .username {
      font-size: 1.6rem;
      font-weight: bold;
      margin-top: 10px;
      text-align: center;
    }

    .level-rank {
      display: flex;
      justify-content: space-around;
      width: 80%;
      margin-top: 10px;
    }

    .level-rank .level,
    .level-rank .rank {
      text-align: center;
      font-size: 0.9rem;
      padding: 5px 10px;
      border-radius: 10px;
      background: linear-gradient(135deg, #00e5ff, #0066ff);
      color: #000;
      font-weight: bold;
    }

    .xp-bar-container {
      width: 80%;
      height: 12px;
      background: #222;
      border-radius: 10px;
      margin: 15px 0;
      overflow: hidden;
    }

    .xp-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(135deg, #00e5ff, #0066ff);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .ncoins {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .achievements {
      width: 90%;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding-bottom: 15px;
    }

    .achievements .ach {
      flex: 0 0 40%;
      padding: 8px 5px;
      text-align: center;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .achievements .unlocked {
      background: linear-gradient(135deg, #00e5ff, #0066ff);
      color: #000;
    }

    .achievements .locked {
      background: #333;
      color: #888;
    }
  </style>
</head>
<body>

<div id="profile-container"></div>

<script>
  const params = new URLSearchParams(window.location.search);
  const data = params.get("profile");

  if (data) {
      const profile = JSON.parse(atob(data));

      // Build achievements grid
      const achievementsHTML = profile.achievementsList.map(a => {
          const unlocked = profile.achievements.includes(a.id);
          return `<div class="ach ${unlocked ? 'unlocked' : 'locked'}">${a.name}</div>`;
      }).join("");

      // Render full profile card
      document.getElementById("profile-container").innerHTML = `
        <div class="shared-profile-card">
          <div class="banner" style="background-image: url('${profile.banner || ""}')"></div>
          <div class="pfp" style="background-image: url('${profile.pfp || ""}')"></div>
          <div class="username">${profile.username}</div>

          <div class="level-rank">
            <div class="level">Level ${profile.level}</div>
            <div class="rank">${profile.rank}</div>
          </div>

          <div class="xp-bar-container">
            <div class="xp-bar" style="width: ${profile.xp % 100}%"></div>
          </div>

          <div class="ncoins">💰 ${profile.nCoins} N-Coins</div>

          <div class="achievements">
            ${achievementsHTML}
          </div>
        </div>
      `;
  }
</script>

</body>
</html>
