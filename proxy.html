<!DOCTYPE html>
<html lang="en">
<head>
<script src="js/nrg-global.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRG | Proxy</title>
    <style>

.bottom-sidebar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 18px;
    padding: 14px 26px;

    background: rgba(10, 18, 35, 0.85);
    backdrop-filter: blur(14px);

    border-radius: 60px;
    border: 1px solid rgba(0, 229, 255, 0.25);
    box-shadow: 0 0 30px rgba(0, 229, 255, 0.25);

    z-index: 9999;
}

.nav-icon {
    width: 48px;
    height: 48px;

    display: flex;
    align-items: center;
    justify-content: center;

    border-radius: 14px;
    cursor: pointer;

    font-size: 22px;
    color: #00e5ff;

    transition: all 0.25s ease;
}


.nav-icon:hover {
    background: linear-gradient(135deg, #00e5ff, #0066ff);
    color: #000;
    transform: translateY(-6px);
    box-shadow: 0 0 20px #00e5ff;
}


.nav-icon.active {
    background: linear-gradient(135deg, #00e5ff, #0066ff);
    color: #000;
    box-shadow: 0 0 20px #00e5ff;
}</style>
</head>

<body style="margin:0; padding:0; background:#0a0f1c; overflow:hidden; font-family:Inter, sans-serif;">


<div style="
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:calc(100vh - 100px);
">
    <iframe 
        src="https://proxy-nrg.b-cdn.net/" 
        style="
            width:100%;
            height:100%;
            border:none;
        ">
    </iframe>
</div>

<!-- Bottom Sidebar -->
<div class="bottom-sidebar">
    <div class="nav-icon" data-page="index.html">🏠</div>
    <div class="nav-icon" data-page="games.html">🎮</div>
    <div class="nav-icon" data-page="movies.html">🎬</div>
    <div class="nav-icon" data-page="ai.html">🤖</div>
    <div class="nav-icon" data-page="proxy.html">🌐</div>
    <div class="nav-icon" data-page="settings.html">⚙</div>
</div>

</div>
<script>
document.querySelectorAll('.bottom-sidebar .nav-icon').forEach(icon => {

    const currentPage = window.location.pathname.split("/").pop();

    if (icon.dataset.page === currentPage) {
        icon.classList.add("active");
    }

    icon.addEventListener('click', () => {
        const page = icon.dataset.page;
        if (page) {
            window.location.href = "/" + page;
        }
    });

});
</script>
      <script src="index.js"></script>
</body>
</html>
