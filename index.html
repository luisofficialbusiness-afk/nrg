<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRG</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Orbitron', sans-serif;
  }

  body {
  background: linear-gradient(-45deg, #0a0a0a, #0a1f3f, #001f4f, #0a0a0a);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

   h1.logo {
    font-size: 8rem;
    letter-spacing: 10px;
    margin-bottom: 50px;
    color: white;
    text-align: center;
  }

  .card-container {
    display: flex;
    gap: 30px;
    justify-content: center;
    margin-bottom: 100px; /* leave space for sidebar */
  }

  .card {
    background-color: #1a1a1a;
    width: 140px;
    height: 180px;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: all 0.3s ease;
    cursor: pointer;
    box-shadow: 0 0 5px rgba(0,0,0,0.5);
  }

  .card:hover {
    background-color: #007bff;
    box-shadow: 0 0 20px #007bff;
    transform: translateY(-5px);
  }

  .card .emoji {
    font-size: 3rem;
    margin-bottom: 15px;
  }

  .card .text {
    font-size: 1.2rem;
    font-weight: bold;
    color: white;
  }

  /* Bottom sidebar */
.bottom-sidebar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 18px;
    padding: 14px 26px;

    background: rgba(10, 18, 35, 0.85);
    backdrop-filter: blur(14px);

    border-radius: 60px;
    border: 1px solid rgba(0, 229, 255, 0.25);
    box-shadow: 0 0 30px rgba(0, 229, 255, 0.25);

    z-index: 9999;
}

.nav-icon {
    width: 48px;
    height: 48px;

    display: flex;
    align-items: center;
    justify-content: center;

    border-radius: 14px;
    cursor: pointer;

    font-size: 22px;
    color: #00e5ff;

    transition: all 0.25s ease;
}

/* Hover */
.nav-icon:hover {
    background: linear-gradient(135deg, #00e5ff, #0066ff);
    color: #000;
    transform: translateY(-6px);
    box-shadow: 0 0 20px #00e5ff;
}

/* Active Page */
.nav-icon.active {
    background: linear-gradient(135deg, #00e5ff, #0066ff);
    color: #000;
    box-shadow: 0 0 20px #00e5ff;
}
</style>
</head>
<body>

  <h1 class="logo">NRG</h1>

  <!-- Horizontal Cards -->
  <div class="card-container">
    <div class="card" data-page="games.html">
      <div class="emoji">🎮</div>
      <div class="text">Games</div>
    </div>
    <div class="card" data-page="movies.html">
      <div class="emoji">🎬</div>
      <div class="text">Movies</div>
    </div>
    <div class="card" data-page="ai.html">
      <div class="emoji">🤖</div>
      <div class="text">AI</div>
    </div>
    <div class="card" data-page="proxy.html">
      <div class="emoji">🌐</div>
      <div class="text">Proxy</div>
    </div>
    <div class="card" data-page="settings.html">
      <div class="emoji">⚙️</div>
      <div class="text">Settings</div>
    </div>
  </div>

  <!-- Bottom Sidebar -->
  <div class="bottom-sidebar">
    <div class="nav-icon" data-page="index.html">🏠</div>
    <div class="nav-icon" data-page="games.html">🎮</div>
    <div class="nav-icon" data-page="ai.html">🤖</div>
    <div class="nav-icon" data-page="proxy.html">🌐</div>
    <div class="nav-icon" data-page="settings.html">⚙</div>
</div>
 
<script>
  // Make cards clickable
  const cards = document.querySelectorAll('.card');
  cards.forEach(card => {
    card.addEventListener('click', () => {
      const targetPage = card.dataset.page;
      if(targetPage) {
        window.location.href = targetPage;
      }
    });
  });

document.querySelectorAll('.bottom-sidebar .nav-icon').forEach(icon => {

    const currentPage = window.location.pathname.split("/").pop();

    if (icon.dataset.page === currentPage) {
        icon.classList.add("active");
    }

    icon.addEventListener('click', () => {
        const page = icon.dataset.page;
        if (page) {
            window.location.href = "/" + page;
        }
    });

});
</script>
 <script src="index.js"></script>

</body>
</html>
