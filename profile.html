<!DOCTYPE html>
<html>
<head>
  <title>NRG | Profile</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="profile-page">

  <!-- Profile Card -->
  <div class="profile-card">

    <!-- Banner -->
    <div class="profile-banner" id="banner"></div>
    <input type="file" id="banner-upload" accept="image/*" hidden>

    <!-- Profile Header -->
    <div class="profile-header">

      <!-- PFP -->
      <div class="pfp" id="pfp"></div>
      <input type="file" id="pfp-upload" accept="image/*" hidden>

      <!-- Profile Info -->
      <div class="profile-info">

        <input type="text" id="username-input" placeholder="Enter username">
        <button onclick="saveProfileInfo()">Save</button>

        <div class="level-section">

          <div class="level-text">
            <span class="level-label">LEVEL</span>
            <span class="level-number" id="level">1</span>
          </div>

          <div class="rank-badge" id="rank">Rookie</div>

          <div class="xp-container">
            <div class="xp-bar">
              <div class="xp-fill" id="xp-fill"></div>
            </div>
            <div class="xp-text">
              <span id="xp">0</span> XP
            </div>
          </div>

          <!-- N-Coins Counter -->
          <div class="ncoins-container">
            <span>N-Coins: </span><span id="ncoins">0</span>
          </div>

          <!-- ⭐ Share Profile Button -->
          <button onclick="shareProfile()">Share Profile</button>

        </div>

      </div>

    </div>

    <!-- Achievements Section -->
    <div class="profile-content">
      <h3 class="section-title">Achievements</h3>
      <div id="achievements-grid"></div>
    </div>

  </div>
</div>

<script src="nrg-system.js"></script>

<script>

function loadProfile() {
  let profile = getProfile();
  let level = getLevel(profile.xp);

  document.getElementById("username-input").value = profile.username;
  document.getElementById("level").innerText = level;
  document.getElementById("xp").innerText = profile.xp;
  document.getElementById("rank").innerText = getRank(level);

  // Update XP bar
  let percent = profile.xp % 100;
  document.getElementById("xp-fill").style.width = percent + "%";

  // Load PFP
  if (profile.pfp) {
    const pfp = document.getElementById("pfp");
    pfp.style.backgroundImage = `url(${profile.pfp})`;
    pfp.style.backgroundSize = "cover";
    pfp.style.backgroundPosition = "center";
  }

  // Load Banner
  if (profile.banner) {
    const banner = document.getElementById("banner");
    banner.style.backgroundImage = `url(${profile.banner})`;
    banner.style.backgroundSize = "cover";
    banner.style.backgroundPosition = "center";
  }

  // Update N-Coins
  document.getElementById("ncoins").innerText = profile.nCoins || 0;

  renderAchievements();
}

function saveProfileInfo() {
  let profile = getProfile();
  profile.username = document.getElementById("username-input").value || "Guest";
  saveProfile(profile);
  loadProfile();
}

// ⭐ Share Profile Function
function shareProfile() {
  const profile = getProfile();

  // Prepare achievements list for display
  const achievementsList = [
    { id: "first_game", name: "🎮 First Game" },
    { id: "gamer_10", name: "🎮 Played 10 Games" },
    { id: "gamer_50", name: "🎮 Played 50 Games" },
    { id: "ai_user", name: "🤖 AI Beginner" },
    { id: "ai_20", name: "🤖 AI Expert (20 Uses)" },
    { id: "xp_100", name: "⭐ 100 XP" },
    { id: "xp_500", name: "⭐ 500 XP" },
    { id: "xp_1000", name: "⭐ 1000 XP" },
    { id: "level_5", name: "🔥 Level 5" },
    { id: "level_10", name: "🔥 Level 10" },
    { id: "level_25", name: "🔥 Level 25" },
    { id: "coins_100", name: "💰 100 N-Coins" },
    { id: "coins_500", name: "💰 500 N-Coins" },
    { id: "visitor_10", name: "📅 10 Visits" }
  ];

  // Include all data needed for the shared profile
  const data = {
    username: profile.username,
    level: getLevel(profile.xp),
    xp: profile.xp,
    rank: getRank(getLevel(profile.xp)),
    nCoins: profile.nCoins || 0,
    pfp: profile.pfp || "",
    banner: profile.banner || "",
    achievements: profile.achievements,
    achievementsList: achievementsList
  };

  const encoded = btoa(JSON.stringify(data));
  const url = `${window.location.origin}/shared-profile.html?profile=${encoded}`;
  window.open(url, "_blank");
}


  
// PFP click trigger
document.getElementById("pfp").addEventListener("click", () => {
  document.getElementById("pfp-upload").click();
});

// Banner click trigger
document.getElementById("banner").addEventListener("click", () => {
  document.getElementById("banner-upload").click();
});

// Upload handlers
document.getElementById("pfp-upload").addEventListener("change", function() {
  const reader = new FileReader();
  reader.onload = function(e) {
    let profile = getProfile();
    profile.pfp = e.target.result;
    saveProfile(profile);
    loadProfile();
  };
  reader.readAsDataURL(this.files[0]);
});

document.getElementById("banner-upload").addEventListener("change", function() {
  const reader = new FileReader();
  reader.onload = function(e) {
    let profile = getProfile();
    profile.banner = e.target.result;
    saveProfile(profile);
    loadProfile();
  };
  reader.readAsDataURL(this.files[0]);
});

function renderAchievements() {
  let profile = getProfile();
  let grid = document.getElementById("achievements-grid");

  const achievementList = {
    first_game: "🎮 First Game",
    gamer_10: "🎮 Played 10 Games",
    gamer_50: "🎮 Played 50 Games",
    ai_user: "🤖 AI Beginner",
    ai_20: "🤖 AI Expert (20 Uses)",
    xp_100: "⭐ 100 XP",
    xp_500: "⭐ 500 XP",
    xp_1000: "⭐ 1000 XP",
    level_5: "🔥 Level 5",
    level_10: "🔥 Level 10",
    level_25: "🔥 Level 25",
    coins_100: "💰 100 N-Coins",
    coins_500: "💰 500 N-Coins",
    visitor_10: "📅 10 Visits"
  };

  grid.innerHTML = "";

  for (let id in achievementList) {
    let unlocked = profile.achievements.includes(id);

    let div = document.createElement("div");
    div.className = unlocked ? "ach unlocked" : "ach locked";
    div.innerText = achievementList[id];

    grid.appendChild(div);
  }
}

loadProfile();

</script>

<script src="index.js"></script>
</body>
</html>
