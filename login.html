<!DOCTYPE html>
<html>
<head>
<title>NRG - Account</title>

<style>
:root {
    --bg-gradient-1: #0a0a0a;
    --bg-gradient-2: #0a1f3f;
    --bg-gradient-3: #001f4f;
    --bg-gradient-4: #0a0a0a;
    --btn-primary-bg: #00d9ff;
    --btn-primary-hover: #00b8e6;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(
        135deg,
        var(--bg-gradient-1),
        var(--bg-gradient-2),
        var(--bg-gradient-3),
        var(--bg-gradient-4)
    );
    height: 100vh;
    display: flex;
    flex-direction: column;
    color: white;
}

/* CENTER CONTENT */
.main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

.auth-container {
    background: rgba(20,20,30,0.95);
    padding: 40px;
    border-radius: 18px;
    width: 360px;
    box-shadow: 0 0 25px rgba(0,217,255,0.15);
    backdrop-filter: blur(10px);
}

.auth-container h2 {
    text-align: center;
    margin-bottom: 20px;
}

.auth-container input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    outline: none;
}

.auth-container button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    background: var(--btn-primary-bg);
    transition: 0.3s;
}

.auth-container button:hover {
    background: var(--btn-primary-hover);
}

.switch {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
    cursor: pointer;
    color: #00d9ff;
}

.hidden {
    display: none;
}

.bottom-sidebar {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 18px;
  padding: 14px 26px;

  background: var(--sidebar-bg);
  backdrop-filter: blur(14px);

  border-radius: 60px;
  border: 1px solid var(--sidebar-border);
  box-shadow: 0 0 30px var(--sidebar-shadow);

  z-index: 9999;
}

.nav-icon {
  width: 48px;
  height: 48px;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 14px;
  cursor: pointer;

  font-size: 22px;
  color: var(--nav-icon-color);

  transition: all 0.25s ease;
}

.nav-icon:hover {
  background: linear-gradient(135deg, var(--btn-bg), #0066ff);
  color: #000;
  transform: translateY(-6px);
  box-shadow: 0 0 20px var(--btn-bg);
}

.nav-icon.active {
  background: linear-gradient(135deg, var(--btn-bg), #0066ff);
  color: #000;
  box-shadow: 0 0 20px var(--btn-bg);
}
</style>
</head>
<body>

<div class="main">
    <div class="auth-container">

        <!-- LOGIN -->
        <div id="login">
            <h2>Login</h2>
            <input type="text" id="login-user" placeholder="Username">
            <input type="password" id="login-pass" placeholder="Password">
            <button onclick="login()">Login</button>
            <div class="switch" onclick="toggleForm()">Don't have an account? Sign Up</div>
        </div>

        <!-- SIGN UP -->
        <div id="signup" class="hidden">
            <h2>Sign Up</h2>
            <input type="text" id="signup-user" placeholder="Username">
            <input type="email" id="signup-email" placeholder="Email">
            <input type="password" id="signup-pass" placeholder="Password">
            <button onclick="signup()">Create Account</button>
            <div class="switch" onclick="toggleForm()">Already have an account? Login</div>
        </div>

    </div>
</div>

<!-- BOTTOM SIDEBAR -->
<div class="bottom-sidebar">
    <div class="nav-icon" data-page="index.html">🏠</div>
    <div class="nav-icon" data-page="games.html">🎮</div>
    <div class="nav-icon" data-page="movies.html">🎬</div>
    <div class="nav-icon" data-page="ai.html">🤖</div>
    <div class="nav-icon" data-page="proxy.html">🌐</div>
    <div class="nav-icon" data-page="settings.html">⚙</div>
</div>

<script>
// Toggle Login/Signup
function toggleForm() {
    document.getElementById('login').classList.toggle('hidden');
    document.getElementById('signup').classList.toggle('hidden');
}

// Fake Sign Up
function signup() {
    const username = document.getElementById('signup-user').value;
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-pass').value;

    if (!username || !email || !password) {
        alert("Please fill out all fields.");
        return;
    }

    const userData = { username, email, password };
    localStorage.setItem("nrg_user", JSON.stringify(userData));
    alert("Account created locally.");
    toggleForm();
}

// Fake Login
function login() {
    const username = document.getElementById('login-user').value;
    const password = document.getElementById('login-pass').value;

    const saved = JSON.parse(localStorage.getItem("nrg_user"));

    if (!saved) {
        alert("No account found.");
        return;
    }

    if (username === saved.username && password === saved.password) {
        localStorage.setItem("nrg_logged_in", "true");
        localStorage.setItem("nrg_username", saved.username);
        window.location.href = "index.html";
    } else {
        alert("Incorrect credentials.");
    }
}

// Sidebar Navigation
function goHome() {
    window.location.href = "index.html";
}

function goGames() {
    window.location.href = "games.html";
}

function goSettings() {
    window.location.href = "settings.html";
}

// Show Guest or Username
const username = localStorage.getItem("nrg_username");
if (username) {
    document.getElementById("user-display").textContent = username;
}

  document.querySelectorAll('.bottom-sidebar .nav-icon').forEach(icon => {

    const currentPage = window.location.pathname.split("/").pop();

    if (icon.dataset.page === currentPage) {
        icon.classList.add("active");
    }

    icon.addEventListener('click', () => {
        const page = icon.dataset.page;
        if (page) {
            window.location.href = "/" + page;
        }
    });

});
</script>

</body>
</html>
