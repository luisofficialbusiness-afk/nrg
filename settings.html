<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRG | Settings</title>

<link rel="stylesheet" href="css/style.css"> <!-- your main css -->

<style>
     body {
  background: linear-gradient(-45deg, #0a0a0a, #0a1f3f, #001f4f, #0a0a0a);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
    
.settings-container {
    max-width: 800px;
    margin: 0 auto;
}

.settings-card {
    background: var(--bg-card);
    padding: 2rem;
    border-radius: 12px;
    margin-bottom: 2rem;
    border: 1px solid var(--border);
}

.settings-card h2 {
    margin-bottom: 1.5rem;
    color: var(--text-secondary);
}

.setting-group {
    margin-bottom: 1.5rem;
}

.setting-group label {
    display: block;
    margin-bottom: 0.5rem;
    color: var(--text-muted);
}

.setting-group input {
    width: 100%;
    padding: 0.75rem 1rem;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
}

.setting-group input:focus {
    outline: none;
    border-color: var(--accent);
}

.button-row {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
}

.nrg-btn {
    padding: 0.75rem 1.5rem;
    background: var(--accent);
    color: var(--bg-primary);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s ease;
}

.nrg-btn:hover {
    background: var(--accent-hover);
    transform: translateY(-2px);
}

.nrg-btn.secondary {
    background: var(--bg-secondary);
    color: var(--text-primary);
}
</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">NRG</div>
        <ul class="nav-menu">
            <li class="nav-item" onclick="location.href='index.html'">Home</li>
            <li class="nav-item" onclick="location.href='games.html'">Games</li>
            <li class="nav-item" onclick="location.href='movies.html'">Movies</li>
            <li class="nav-item active">Settings</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main-content">
        <div class="header">
            <div class="page-title">
                ⚙ Settings
            </div>
        </div>

        <div class="settings-container">

            <!-- WEBSITE CLOAK -->
            <div class="settings-card">
                <h2>Website Cloak</h2>

                <div class="setting-group">
                    <label>Tab Title</label>
                    <input type="text" id="cloakTitle" placeholder="Google Classroom">
                </div>

                <div class="setting-group">
                    <label>Tab Icon URL</label>
                    <input type="text" id="cloakIcon" placeholder="https://example.com/icon.ico">
                </div>

                <div class="button-row">
                    <button class="nrg-btn" onclick="saveCloak()">Apply Cloak</button>
                    <button class="nrg-btn secondary" onclick="resetCloak()">Reset</button>
                </div>
            </div>

            <!-- PRESETS -->
            <div class="settings-card">
                <h2>Quick Cloak Presets</h2>

                <div class="button-row">
                    <button class="nrg-btn secondary" onclick="presetGoogle()">Google</button>
                    <button class="nrg-btn secondary" onclick="presetClassroom()">Classroom</button>
                    <button class="nrg-btn secondary" onclick="presetCanvas()">Canvas</button>
                </div>
            </div>

            <!-- ABOUT BLANK -->
            <div class="settings-card">
                <h2>Privacy</h2>

                <div class="button-row">
                    <button class="nrg-btn open-about">
                        Open NRG in about:blank
                    </button>
                </div>
            </div>

        </div>
    </div>

</div>

<script src="js/nrg-global.js"></script>

<script>
function saveCloak() {
    const title = document.getElementById("cloakTitle").value;
    const icon = document.getElementById("cloakIcon").value;
    applyCloak(title, icon);
}

function resetCloak() {
    localStorage.removeItem("nrg_cloak_title");
    localStorage.removeItem("nrg_cloak_icon");
    location.reload();
}

/* PRESETS */
function presetGoogle() {
    applyCloak("Google", "https://www.google.com/favicon.ico");
}

function presetClassroom() {
    applyCloak("Google Classroom", "https://ssl.gstatic.com/classroom/favicon.png");
}

function presetCanvas() {
    applyCloak("Canvas", "https://du11hjcvx0uqb.cloudfront.net/dist/images/favicon-e10d657a73.ico");
}
</script>

</body>
</html>
