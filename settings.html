<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRG | Settings</title>

<link rel="stylesheet" href="css/style.css">

<style>
:root {
  /* Background Gradient */
  --bg-gradient-1: #0a0a0a;
  --bg-gradient-2: #0a1f3f;
  --bg-gradient-3: #001f4f;
  --bg-gradient-4: #0a0a0a;

  /* Text & Input */
  --text-color: white;
  --label-color: #8b7ea8;
  --input-bg: #1e1e2e;
  --input-border: rgba(0,217,255,0.2);
  --input-focus: #00d9ff;

  /* Buttons */
  --btn-primary-bg: #00d9ff;
  --btn-primary-hover: #00b8e6;
  --btn-primary-color: black;
  --btn-secondary-bg: #1e1e2e;
  --btn-secondary-color: white;

  /* Cards / Settings */
  --card-bg: rgba(20,20,30,0.85);
  --card-border: rgba(0,217,255,0.2);
  --card-radius: 14px;

  /* Sidebar */
  --sidebar-bg: rgba(10, 18, 35, 0.85);
  --sidebar-border: rgba(0, 229, 255, 0.25);
  --sidebar-shadow: rgba(0, 229, 255, 0.25);
  --sidebar-icon: #00e5ff;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(-45deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3), var(--bg-gradient-4));
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  color: var(--text-color);
  padding-bottom: 90px; /* space for bottom sidebar */
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.settings-container {
  max-width: 800px;
  margin: 50px auto;
}

.settings-card {
  background: var(--card-bg);
  padding: 2rem;
  border-radius: var(--card-radius);
  margin-bottom: 2rem;
  border: 1px solid var(--card-border);
  backdrop-filter: blur(10px);
}

.settings-card h2 {
  margin-bottom: 1.5rem;
  color: var(--btn-primary-bg);
}

.setting-group {
  margin-bottom: 1.5rem;
}

.setting-group label {
  display: block;
  margin-bottom: 0.5rem;
  color: var(--label-color);
}

.setting-group input {
  width: 100%;
  padding: 0.75rem 1rem;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: 8px;
  color: var(--text-color);
}

.setting-group input:focus {
  outline: none;
  border-color: var(--input-focus);
}

.button-row {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
}

.nrg-btn {
  padding: 0.75rem 1.5rem;
  background: var(--btn-primary-bg);
  color: var(--btn-primary-color);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s ease;
}

.nrg-btn:hover {
  background: var(--btn-primary-hover);
  transform: translateY(-2px);
}

.nrg-btn.secondary {
  background: var(--btn-secondary-bg);
  color: var(--btn-secondary-color);
}

/* Bottom Sidebar */
.bottom-sidebar {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 18px;
  padding: 14px 26px;
  background: var(--sidebar-bg);
  backdrop-filter: blur(14px);
  border-radius: 60px;
  border: 1px solid var(--sidebar-border);
  box-shadow: 0 0 30px var(--sidebar-shadow);
  z-index: 9999;
}

.nav-icon {
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 14px;
  cursor: pointer;
  font-size: 22px;
  color: var(--sidebar-icon);
  transition: all 0.25s ease;
}

.nav-icon:hover {
  background: linear-gradient(135deg, var(--sidebar-icon), #0066ff);
  color: #000;
  transform: translateY(-6px);
  box-shadow: 0 0 20px var(--sidebar-icon);
}

.nav-icon.active {
  background: linear-gradient(135deg, var(--sidebar-icon), #0066ff);
  color: #000;
  box-shadow: 0 0 20px var(--sidebar-icon);
}
     
</style>
</head>

<body>

<div class="settings-container">

    <div class="settings-card">
        <h2>Website Cloak</h2>

        <div class="setting-group">
            <label>Tab Title</label>
            <input type="text" id="cloakTitle" placeholder="Google Classroom">
        </div>

        <div class="setting-group">
            <label>Tab Icon URL</label>
            <input type="text" id="cloakIcon" placeholder="https://example.com/icon.ico">
        </div>

        <div class="button-row">
            <button class="nrg-btn" onclick="saveCloak()">Apply Cloak</button>
            <button class="nrg-btn secondary" onclick="resetCloak()">Reset</button>
        </div>
    </div>

    <div class="settings-card">
        <h2>Quick Cloak Presets</h2>

        <div class="button-row">
            <button class="nrg-btn secondary" onclick="presetGoogle()">Google</button>
            <button class="nrg-btn secondary" onclick="presetClassroom()">Classroom</button>
            <button class="nrg-btn secondary" onclick="presetCanvas()">Canvas</button>
        </div>
    </div>

    <div class="settings-card">
        <h2>Privacy</h2>

        <div class="button-row">
            <button class="nrg-btn" onclick="openAboutBlank()">
                Open NRG in about:blank
            </button>
        </div>
    </div>
  
<!-- PANIC SETTINGS -->
<div class="settings-card">
    <h2>Panic Settings</h2>

    <div class="setting-group">
        <label>Panic Key</label>
        <input type="text" id="panic-key" maxlength="1" placeholder="\"">
    </div>

    <div class="setting-group">
        <label>Panic Redirect URL</label>
        <input type="text" id="panic-url" placeholder="https://google.com">
    </div>

    <div class="button-row">
        <button class="nrg-btn" onclick="savePanicSettings()">Save Panic Settings</button>
    </div>
</div>

<!-- IMPORT / EXPORT -->
<div class="settings-card">
    <h2>Import / Export Settings</h2>

    <div class="button-row">
        <button class="nrg-btn" onclick="exportSettings()">
            Export Settings
        </button>

        <button class="nrg-btn secondary"
            onclick="document.getElementById('import-file').click()">
            Import Settings
        </button>
    </div>

    <input type="file" id="import-file" style="display:none;" accept=".json">
</div>
  
<div class="settings-card">
    <h2>Themes</h2>

    <div class="setting-group">
        <label>Select Theme</label>
        <select id="theme-chooser">
            <option value="default">Default</option>
            <option value="ocean">Ocean</option>
            <option value="sunset">Sunset</option>
            <option value="neon">Neon</option>
        </select>
    </div>

    <div class="button-row">
        <button class="nrg-btn" onclick="applyTheme()">Apply Theme</button>
        <button class="nrg-btn secondary" onclick="resetTheme()">Reset Theme</button>
    </div>
</div>

<!-- Bottom Sidebar -->
<div class="bottom-sidebar">
    <div class="nav-icon" data-page="index.html">🏠</div>
    <div class="nav-icon" data-page="games.html">🎮</div>
    <div class="nav-icon" data-page="ai.html">🤖</div>
    <div class="nav-icon" data-page="proxy.html">🌐</div>
    <div class="nav-icon" data-page="settings.html">⚙</div>
</div>
     
<script>
/* ==============================
   CLOAK FUNCTIONS
============================== */
function saveCloak() {
    const title = document.getElementById("cloakTitle").value;
    const icon = document.getElementById("cloakIcon").value;

    if(title) {
        localStorage.setItem("nrg_cloak_title", title);
        document.title = title;
    }

    if(icon) {
        localStorage.setItem("nrg_cloak_icon", icon);
        setIcon(icon);
    }

    alert("Cloak Applied");
}

function resetCloak() {
    localStorage.removeItem("nrg_cloak_title");
    localStorage.removeItem("nrg_cloak_icon");
    location.reload();
}

function setIcon(url) {
    let link = document.querySelector("link[rel~='icon']");
    if (!link) {
        link = document.createElement('link');
        link.rel = 'icon';
        document.head.appendChild(link);
    }
    link.href = url;
}

window.addEventListener("load", () => {
    const savedTitle = localStorage.getItem("nrg_cloak_title");
    const savedIcon = localStorage.getItem("nrg_cloak_icon");

    if(savedTitle) document.title = savedTitle;
    if(savedIcon) setIcon(savedIcon);

    // Initialize panic inputs
    document.getElementById("panic-key").value = localStorage.getItem("nrg_panic_key") || "\\";
    document.getElementById("panic-url").value = localStorage.getItem("nrg_panic_url") || "https://google.com";

    // Highlight current bottom sidebar icon
    const currentPage = window.location.pathname.split("/").pop();
    document.querySelectorAll('.bottom-sidebar .nav-icon').forEach(icon => {
        if(icon.dataset.page === currentPage) icon.classList.add("active");
    });
});

/* CLOAK PRESETS */
function presetGoogle() {
    document.getElementById("cloakTitle").value = "Google";
    document.getElementById("cloakIcon").value = "https://www.google.com/favicon.ico";
}
function presetClassroom() {
    document.getElementById("cloakTitle").value = "Google Classroom";
    document.getElementById("cloakIcon").value = "https://ssl.gstatic.com/classroom/favicon.png";
}
function presetCanvas() {
    document.getElementById("cloakTitle").value = "Canvas";
    document.getElementById("cloakIcon").value = "https://du11hjcvx0uqb.cloudfront.net/dist/images/favicon-e10d657a73.ico";
}

/* ABOUT BLANK */
function openAboutBlank() {
    const win = window.open("about:blank", "_blank");
    win.document.write(`
        <iframe src="${location.href}" style="width:100%;height:100%;border:none;"></iframe>
    `);
}

/* BOTTOM SIDEBAR NAVIGATION */
document.querySelectorAll('.bottom-sidebar .nav-icon').forEach(icon => {
    icon.addEventListener('click', () => {
        const page = icon.dataset.page;
        if(page) window.location.href = "/" + page;
    });
});

/* PANIC SETTINGS */
function savePanicSettings() {
    const key = document.getElementById("panic-key").value;
    const url = document.getElementById("panic-url").value;

    localStorage.setItem("nrg_panic_key", key);
    localStorage.setItem("nrg_panic_url", url);

    alert("Panic settings saved.");
}

/* IMPORT / EXPORT SETTINGS */
function exportSettings() {
    const data = {};
    for(let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        data[key] = localStorage.getItem(key);
    }

    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "nrg-settings.json";
    link.click();
}

document.getElementById("import-file").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        try {
            const data = JSON.parse(event.target.result);
            Object.keys(data).forEach(key => localStorage.setItem(key, data[key]));
            alert("Settings imported. Reloading...");
            location.reload();
        } catch(err) {
            alert("Failed to import settings: Invalid JSON");
        }
    };
    reader.readAsText(file);
});

  // Define theme colors
const themes = {
    default: {
        '--bg-gradient-1': '#0a0a0a',
        '--bg-gradient-2': '#0a1f3f',
        '--bg-gradient-3': '#001f4f',
        '--bg-gradient-4': '#0a0a0a',
        '--btn-primary-bg': '#00d9ff',
        '--btn-primary-hover': '#00b8e6',
        '--btn-secondary-bg': '#1e1e2e'
    },
    ocean: {
        '--bg-gradient-1': '#001f3f',
        '--bg-gradient-2': '#003366',
        '--bg-gradient-3': '#0055a5',
        '--bg-gradient-4': '#001f3f',
        '--btn-primary-bg': '#00ffaa',
        '--btn-primary-hover': '#00dd88',
        '--btn-secondary-bg': '#0a1f3f'
    },
    sunset: {
        '--bg-gradient-1': '#ff6b6b',
        '--bg-gradient-2': '#ff8e53',
        '--bg-gradient-3': '#ffb347',
        '--bg-gradient-4': '#ff6b6b',
        '--btn-primary-bg': '#ffb347',
        '--btn-primary-hover': '#ffa500',
        '--btn-secondary-bg': '#1a1a1a'
    },
    neon: {
        '--bg-gradient-1': '#0f0f0f',
        '--bg-gradient-2': '#ff00ff',
        '--bg-gradient-3': '#00ffff',
        '--bg-gradient-4': '#0f0f0f',
        '--btn-primary-bg': '#ff00ff',
        '--btn-primary-hover': '#ff66ff',
        '--btn-secondary-bg': '#1e1e1e'
    }
};

// Apply selected theme
function applyTheme() {
    const themeName = document.getElementById('theme-chooser').value;
    const theme = themes[themeName];

    if (!theme) return;

    Object.keys(theme).forEach(key => {
        document.documentElement.style.setProperty(key, theme[key]);
        localStorage.setItem('nrg_theme_' + key, theme[key]);
    });

    localStorage.setItem('nrg_theme_selected', themeName);
    alert(`Theme "${themeName}" applied.`);
}

// Reset theme to default
function resetTheme() {
    applyThemeDefault();
    document.getElementById('theme-chooser').value = 'default';
    alert('Theme reset to default.');
}

// Apply saved theme on load
window.addEventListener('load', () => {
    const savedTheme = localStorage.getItem('nrg_theme_selected') || 'default';
    document.getElementById('theme-chooser').value = savedTheme;

    if (themes[savedTheme]) {
        Object.keys(themes[savedTheme]).forEach(key => {
            const value = localStorage.getItem('nrg_theme_' + key) || themes[savedTheme][key];
            document.documentElement.style.setProperty(key, value);
        });
    }
});

// Reset to default colors
function applyThemeDefault() {
    Object.keys(themes.default).forEach(key => {
        document.documentElement.style.setProperty(key, themes.default[key]);
        localStorage.setItem('nrg_theme_' + key, themes.default[key]);
    });
}
</script>

</body>
</html>
