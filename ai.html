<!DOCTYPE html>
<html lang="en">d
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRG AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Orbitron', sans-serif;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
  }

  @keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

  .iframe-container {
    flex: 1 1 auto; /* takes all available space */
    width: 100%;
    overflow: hidden;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .bottom-sidebar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 18px;
    padding: 14px 26px;

    background: rgba(10, 18, 35, 0.85);
    backdrop-filter: blur(14px);

    border-radius: 60px;
    border: 1px solid rgba(0, 229, 255, 0.25);
    box-shadow: 0 0 30px rgba(0, 229, 255, 0.25);

    z-index: 9999;
    }

.nav-icon {
  width: 48px;
  height: 48px;
   display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 14px;
  cursor: pointer;
  font-size: 22px;
  color: #00e5ff;
  }


.nav-icon:hover {
    background: linear-gradient(135deg, #00e5ff, #0066ff);
    color: #000;
    transform: translateY(-6px);
    box-shadow: 0 0 20px #00e5ff;ransition: all 0.25s ease;
  }


.nav-icon.active {
    background: linear-gradient(135deg, #00e5ff, #0066ff);
    color: #000;
    box-shadow: 0 0 20px #00e5ff;
  }
</style>
</head>
<body>

<div class="iframe-container">
  <iframe src="https://proxy-nrg.b-cdn.net/service/hvtrs8%2F-rmuqilg%2Fnpg%2Fak-eo%2Cbcsg46.cpr%2F" allowfullscreen></iframe>
</div>

<div class="bottom-sidebar">
    <div class="nav-icon" data-page="index.html">🏠</div>
    <div class="nav-icon" data-page="games.html">🎮</div>
       <div class="nav-icon" data-page="movies.html">🎬</div>
    <div class="nav-icon" data-page="ai.html">🤖</div>
    <div class="nav-icon" data-page="proxy.html">🌐</div>
    <div class="nav-icon" data-page="settings.html">⚙</div>
</div>

<script>
document.querySelectorAll('.bottom-sidebar .nav-icon').forEach(icon => {

    const currentPage = window.location.pathname.split("/").pop();

    if (icon.dataset.page === currentPage) {
        icon.classList.add("active");
    }

    icon.addEventListener('click', () => {
        const page = icon.dataset.page;
        if (page) {
            window.location.href = "/" + page;
        }
    });

});

</script>
    <script>
// Add XP and track AI usage
window.addEventListener('load', () => {
    // Give XP for visiting AI page
    addXP(5);

    // Track AI usage progress
    addProgress("aiUses", 1);

    // Optional: log to console for testing
    console.log("AI page XP added and progress updated.");
});
</script>
    <script src="index.js"></script>
<script src="nrg-system.js"></script>

</body>
</html>
