<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRG AI</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body, html {
  width: 100%;
  height: 100%;
  background-color: #0a0a0a;
  overflow: hidden;
  font-family: 'Orbitron', sans-serif;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>
<body>

<iframe src="https://rousing-nrg-ai-go.base44.app" title="NRG AI App"></iframe>

   <div class="sidebar">
    <div class="icon" data-page="index.html">🏠</div>
    <div class="icon" data-page="games.html">🎮</div>
    <div class="icon" data-page="ai.html">🤖</div>
    <div class="icon" data-page="proxy.html">🌐</div>
    <div class="icon" data-page="movies.html">🎬</div>
    <div class="icon" data-page="radio.html">📻</div>
  </div>

  <script>
  // Make cards clickable
  const cards = document.querySelectorAll('.card');
  cards.forEach(card => {
    card.addEventListener('click', () => {
      const targetPage = card.dataset.page;
      if(targetPage) {
        window.location.href = targetPage;
      }
    });
  });

  // Make sidebar icons clickable
  const icons = document.querySelectorAll('.sidebar .icon');
  icons.forEach(icon => {
    icon.addEventListener('click', () => {
      const targetPage = icon.dataset.page;
      if(targetPage) {
        window.location.href = targetPage;
      }
    });
  });
</script>


</body>
</html>
