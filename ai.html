<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRG AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Orbitron', sans-serif;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
  }
   
@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

  .iframe-container {
    flex: 1 1 auto; /* takes all available space */
    width: 100%;
    overflow: hidden;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .sidebar {
    height: 70px; /* fixed bottom bar height */
    width: 100%;
    background: #121212;
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 2px solid #007bff;
    flex-shrink: 0;
  }

  .sidebar .icon {
    font-size: 2rem;
    cursor: pointer;
    transition: 0.3s ease;
  }

  .sidebar .icon:hover {
    color: #007bff;
    transform: scale(1.2);
    text-shadow: 0 0 10px #007bff;
  }
</style>
</head>
<body>

<div class="iframe-container">
  <iframe src="https://rousing-nrg-ai-go.base44.app" allowfullscreen></iframe>
</div>

<div class="sidebar">
  <div class="icon" data-page="index.html">🏠</div>
  <div class="icon" data-page="games.html">🎮</div>
  <div class="icon" data-page="ai.html">🤖</div>
  <div class="icon" data-page="proxy.html">🌐</div>
  <div class="icon" data-page="movies.html">🎬</div>
  <div class="icon" data-page="settings.html">⚙️</div>
</div>

<script>
  const icons = document.querySelectorAll('.sidebar .icon');
  icons.forEach(icon => {
    icon.addEventListener('click', () => {
      const targetPage = icon.dataset.page;
      if(targetPage) {
        window.location.href = targetPage;
      }
    });
  });
</script>
    <script src="js/index.js"></script>

</body>
</html>
