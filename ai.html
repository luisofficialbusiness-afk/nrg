<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRG AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Orbitron', sans-serif;
  }

  body {
    background-color: #0a0a0a;
    color: white;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .iframe-container {
    flex: 1;
    width: 100%;
    height: calc(100vh - 70px); /* leave space for bottom sidebar */
    overflow: hidden;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .sidebar {
    width: 100%;
    height: 70px;
    background: #121212;
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 2px solid #007bff;
  }

  .sidebar .icon {
    font-size: 1.8rem;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .sidebar .icon:hover {
    color: #007bff;
    transform: scale(1.2);
    text-shadow: 0 0 10px #007bff;
  }

  ::-webkit-scrollbar {
    width: 8px;
  }

  ::-webkit-scrollbar-track {
    background: #111;
  }

  ::-webkit-scrollbar-thumb {
    background: #007bff;
    border-radius: 10px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: #3399ff;
  }
</style>
</head>
<body>

<div class="iframe-container">
  <iframe src="https://rousing-nrg-ai-go.base44.app" allowfullscreen></iframe>
</div>

<div class="sidebar">
  <div class="icon" data-page="index.html">🏠</div>
  <div class="icon" data-page="games.html">🎮</div>
  <div class="icon" data-page="ai.html">🤖</div>
  <div class="icon" data-page="proxy.html">🌐</div>
  <div class="icon" data-page="movies.html">🎬</div>
  <div class="icon" data-page="radio.html">📻</div>
</div>

<script>
  // Make sidebar icons clickable
  const icons = document.querySelectorAll('.sidebar .icon');
  icons.forEach(icon => {
    icon.addEventListener('click', () => {
      const targetPage = icon.dataset.page;
      if(targetPage) {
        window.location.href = targetPage;
      }
    });
  });
</script>

</body>
</html>
